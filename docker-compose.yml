version: '3.8'

services:
  app:
    build: ./J4U
    container_name: justice4u-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=j4u
      - DB_USER=root
      - DB_PASS=J4uSecure@2024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - j4u-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: justice4u-db
    environment:
      - MYSQL_ROOT_PASSWORD=J4uSecure@2024
      - MYSQL_DATABASE=j4u
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./J4U/justice4u_final.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pJ4uSecure@2024"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - j4u-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  j4u-network:
    driver: bridge
