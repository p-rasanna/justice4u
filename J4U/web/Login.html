<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justice4U | System Administrator</title>
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #FDFBF7; 
      --surface: #FFFFFF;
      --border: rgba(28, 25, 23, 0.08);
      --text-main: #1C1917; 
      --text-muted: #57534E;
      --accent-gold: #D4AF37; 
      --accent-gold-dark: #B48E2D;
      --font-sans: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05), transparent 70%);
    }

    .login-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
      padding: 48px; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.03);
      position: relative; overflow: hidden;
    }

    .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text-main); margin-bottom: 32px; justify-content: center; }
    .logo i { color: var(--accent-gold); font-size: 2rem; }

    h2 { text-align: center; margin-bottom: 8px; font-weight: 700; font-size: 1.4rem; }
    p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
    
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: #FAFAFA; font-family: inherit; font-size: 1rem; transition: all 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent-gold); background: #FFF; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }

    .btn-submit {
      width: 100%; background: var(--text-main); color: #fff; padding: 16px; border-radius: 12px;
      font-weight: 600; font-size: 1rem; border: none; cursor: pointer; transition: all 0.3s;
      margin-top: 12px; box-shadow: 0 4px 12px rgba(28, 25, 23, 0.15);
    }
    .btn-submit:hover { background: var(--accent-gold-dark); transform: translateY(-2px); }

    .error-msg { color: #DC2626; text-align: center; font-size: 0.9rem; margin-bottom: 16px; display: none; padding: 12px; background: #FEF2F2; border-radius: 8px; }
    .back-link { display: block; text-align: center; margin-top: 24px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .back-link:hover { color: var(--text-main); }
  </style>
</head>
<body>

  <div class="login-box">
    <a href="Home.html" class="logo"><i class="ph-fill ph-scales"></i> Justice4U</a>
    <h2>System Administrator</h2>
    <p class="subtitle">Access structural administrative controls.</p>

    <div id="errorBox" class="error-msg"></div>

    <form action="LoginServlet" method="post">
      <input type="hidden" name="role" value="admin">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="admin@justice4u.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit">Secure Login</button>
    </form>
    
    <a href="role_select.html" class="back-link"><i class="ph-bold ph-arrow-left"></i> Back to Role Selection</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const errorMsg = urlParams.get('error') || urlParams.get('msg');
    if (errorMsg) {
      const errorDiv = document.getElementById('errorBox');
      errorDiv.innerText = decodeURIComponent(errorMsg);
      errorDiv.style.display = 'block';
    }
  </script>
</body>
</html>
