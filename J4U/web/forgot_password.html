<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justice4U – Reset Credentials</title>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

  <style>
    /* ============================
       THE SANCTUARY THEME (Shared)
       ============================ */
    :root {
      --bg-color: #FAFAF9;
      --ink-primary: #111111;
      --ink-secondary: #555555;
      --ink-tertiary: #999999;
      
      --gold-main: #C6A75E;
      --gold-faint: rgba(198, 167, 94, 0.08);
      
      --surface-glass: rgba(255, 255, 255, 0.85);
      --border-line: #E5E5E5;
      
      --shadow-soft: 0 4px 20px rgba(0,0,0,0.03);
      --ease-smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * { box-sizing: border-box; outline: none; }

    body {
      margin: 0; background-color: var(--bg-color); color: var(--ink-primary);
      font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden;
    }

    /* Ambient Background */
    .ambience {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    }
    .pillar-bg {
      position: fixed; top: 0; left: 50%; width: 1200px; height: 100%; transform: translateX(-50%); opacity: 0.03;
      background: repeating-linear-gradient(90deg, #000 0, #000 1px, transparent 1px, transparent 100px); z-index: -1;
    }

    /* Header */
    .header {
      padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 0; color: var(--ink-primary); letter-spacing: -0.01em; }

    .nav-links { display: flex; gap: 24px; list-style: none; margin: 0; padding: 0; }
    .nav-links a { text-decoration: none; color: var(--ink-secondary); font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold-main); }

    /* Centered Stage */
    .stage {
      max-width: 480px; margin: 80px auto 100px; padding: 0 20px;
      opacity: 0; animation: fadeUp 1s var(--ease-smooth) forwards;
    }

    .form-header { text-align: center; margin-bottom: 32px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0 0 12px 0; color: var(--ink-primary); }
    .subtext { font-size: 0.95rem; line-height: 1.5; color: var(--ink-secondary); }

    /* Alert Banner */
    .alert {
      display: none; padding: 14px 16px; margin-bottom: 24px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; line-height: 1.4; display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: -2px; }
    .alert.error { background: #FEF2F2; color: #991B1B; border: 1px solid #F87171; display: none; }
    .alert.success { background: #ECFDF5; color: #065F46; border: 1px solid #34D399; display: none; }

    /* Form Card */
    .form-card {
      background: var(--surface-glass); border: 1px solid var(--border-line); border-radius: 16px; padding: 40px; box-shadow: var(--shadow-soft); position: relative; overflow: hidden;
    }
    .form-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--gold-main), #E5D4A5);
    }

    .input-group { position: relative; margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--ink-secondary); margin-bottom: 8px; letter-spacing: 0.02em; }
    
    .input-field {
      width: 100%; background: #FFFFFF; border: 1px solid var(--border-line); padding: 14px 16px 14px 44px; border-radius: 8px; font-size: 0.95rem; color: var(--ink-primary); font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .input-icon { position: absolute; left: 14px; top: 38px; font-size: 1.2rem; color: var(--ink-tertiary); pointer-events: none; transition: color 0.2s; }

    .input-field:focus { border-color: var(--ink-primary); box-shadow: 0 0 0 3px var(--gold-faint); }
    .input-field:focus ~ .input-icon { color: var(--gold-main); }
    
    select.input-field { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 14px center; background-size: 16px; }

    .password-wrapper { position: relative; }
    .toggle-pass { position: absolute; right: 14px; top: 14px; background: none; border: none; cursor: pointer; color: var(--ink-tertiary); padding: 0; transition: color 0.2s; }
    .toggle-pass:hover { color: var(--ink-primary); }

    .btn-submit {
      width: 100%; padding: 16px; background: var(--ink-primary); color: #fff; font-weight: 600; font-size: 0.95rem; border: none; border-radius: 8px; cursor: pointer; margin-top: 12px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); background: #000; }

    .back-link {
      display: block; text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--ink-secondary); text-decoration: none; font-weight: 500; transition: 0.2s;
    }
    .back-link:hover { color: var(--ink-primary); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="ambience"><div class="pillar-bg"></div></div>

  <header class="header">
    <div class="logo"><a href="Home.html" style="text-decoration:none;"><h1>Justice4U</h1></a></div>
    <ul class="nav-links">
      <li><a href="Home.html">Home</a></li>
      <li><a href="Login.html">Login</a></li>
    </ul>
  </header>

  <div class="stage">
    
    <div class="form-header">
      <h2>Reset Credentials</h2>
      <p class="subtext">Verify your identity using your security question to securely reset your password.</p>
    </div>

    <div class="alert error" id="errorAlert">
      <i class="ph-fill ph-warning-circle alert-icon"></i>
      <span id="errorMsg"></span>
    </div>
    
    <div class="alert success" id="successAlert">
      <i class="ph-fill ph-check-circle alert-icon"></i>
      <span id="successMsg"></span>
    </div>

    <form class="form-card" id="resetForm" action="PasswordResetServlet" method="post" novalidate>
      
      <div class="input-group">
        <label>Account Role</label>
        <select name="role" class="input-field" required>
          <option value="client">Client</option>
          <option value="lawyer">Lawyer</option>
          <option value="intern">Intern</option>
        </select>
        <i class="ph ph-briefcase input-icon"></i>
      </div>

      <div class="input-group">
        <label>Registered Email Address</label>
        <input type="email" name="email" class="input-field" placeholder="john@example.com" required>
        <i class="ph ph-envelope input-icon"></i>
      </div>

      <div class="input-group">
        <label>Security Question</label>
        <select name="securityQuestion" class="input-field" required>
          <option value="">Select your security question</option>
          <option value="What city were you born in?">What city were you born in?</option>
          <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
          <option value="What was the name of your first pet?">What was the name of your first pet?</option>
          <option value="What is the name of your favorite high school teacher?">What is the name of your favorite high school teacher?</option>
          <option value="What was the name of your first law school professor?">What was the name of your first law school professor?</option>
          <option value="What is the name of your favorite childhood teacher?">What is the name of your favorite childhood teacher?</option>
        </select>
        <i class="ph ph-question input-icon"></i>
      </div>

      <div class="input-group">
        <label>Security Answer</label>
        <input type="text" name="securityAnswer" class="input-field" placeholder="Answer to your security question" required>
        <i class="ph ph-key input-icon"></i>
      </div>

      <div class="input-group">
        <label>New Password</label>
        <div class="password-wrapper">
          <input type="password" name="newPassword" id="pass1" class="input-field" placeholder="Min. 8 characters" required minlength="8">
          <i class="ph ph-lock-key input-icon"></i>
          <button type="button" class="toggle-pass" onclick="togglePass('pass1')"><i class="ph ph-eye"></i></button>
        </div>
      </div>

      <div class="input-group" style="margin-bottom: 32px;">
        <label>Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="pass2" class="input-field" placeholder="Re-enter new password" required>
          <i class="ph ph-lock-key input-icon"></i>
          <button type="button" class="toggle-pass" onclick="togglePass('pass2')"><i class="ph ph-eye"></i></button>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="ph ph-arrows-clockwise"></i> Reset Password
      </button>

      <a href="Login.html" class="back-link">&larr; Back to Login</a>

    </form>
  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('resetForm').addEventListener('submit', function(e) {
      const p1 = document.getElementById('pass1').value;
      const p2 = document.getElementById('pass2').value;
      if (p1 !== p2) {
        e.preventDefault();
        document.getElementById('errorMsg').innerText = "Passwords do not match.";
        document.getElementById('errorAlert').style.display = 'flex';
        document.getElementById('successAlert').style.display = 'none';
      }
    });

    // Parse URL params for errors or success messages
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      
      const roleParam = urlParams.get('role');
      if (roleParam) {
        const roleSelect = document.querySelector('select[name="role"]');
        if (roleSelect) {
          roleSelect.value = roleParam;
          // Make it read-only visually so the user knows it's locked to their portal
          roleSelect.style.pointerEvents = 'none';
          roleSelect.style.backgroundColor = '#f3f4f6';
          roleSelect.style.color = 'var(--ink-secondary)';
        }
      }

      const error = urlParams.get('error');
      const msg = urlParams.get('msg');
      if (error) {
        document.getElementById('errorMsg').innerText = error;
        document.getElementById('errorAlert').style.display = 'flex';
      }
      if (msg) {
        document.getElementById('successMsg').innerText = msg;
        document.getElementById('successAlert').style.display = 'flex';
      }
    }
  </script>

</body>
</html>
