version: '3.8'

services:
  app:
    build: .
    container_name: justice4u-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=j4u
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      - db
    networks:
      - j4u-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: justice4u-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=j4u
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./j4u_database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - j4u-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  j4u-network:
    driver: bridge
