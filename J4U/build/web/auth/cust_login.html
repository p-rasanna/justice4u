
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justice4U | Client Portal Login</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/app-layout.css">
</head>
<body class="auth-grid">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3 fw-bold" style="letter-spacing:-0.02em;">
                <i class="ph-fill ph-scales text-gold" style="font-size: 1.25rem;"></i> Justice4U
            </div>
            <div class="badge bg-light mb-3">Client Portal</div>
            <h1 class="font-serif mb-2" style="font-size:2rem;">Welcome back.</h1>
            <p class="text-muted small mb-0">Securely access your account below.</p>
        </div>
        
        <div class="alert alert-danger d-none mb-3" id="errorBanner"><i class="ph-fill ph-warning-circle"></i> <span id="errorText"></span></div>
        <div class="alert alert-success d-none mb-3" id="successBanner"><i class="ph-fill ph-check-circle text-green"></i> <span id="successText"></span></div>
        

        <form action="../LoginServlet" method="post" id="loginForm" novalidate>
            <input type="hidden" name="role" value="client">
            
            <div class="form-group mb-3">
                <label class="form-label" for="email">Account Identity</label>
                <div class="position-relative d-flex align-items-center">
                    <i class="ph ph-envelope text-faint position-absolute ms-3"></i>
                    <input type="text" id="email" name="email" class="form-control" required style="padding-left: 36px;">
                </div>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label" for="password">Security Protocol</label>
                <div class="position-relative d-flex align-items-center">
                    <i class="ph ph-lock-key text-faint position-absolute ms-3"></i>
                    <input type="password" id="password" name="password" class="form-control" required style="padding-left: 36px; padding-right: 36px;">
                    <button type="button" class="btn btn-sm position-absolute end-0 text-muted" id="passToggle" tabindex="-1"><i class="ph ph-eye" id="passIcon"></i></button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 p-3" id="submitBtn">Authenticate <i class="ph-bold ph-arrow-right ms-2"></i></button>
        </form>

        <div class="d-flex justify-content-between align-items-center mt-4 pt-4 border-top">
            <a href="../landing/role_select.html" class="text-muted text-decoration-none small fw-semibold"><i class="ph-bold ph-arrow-left me-2"></i> Return</a>
            <a href="../client/customer.html" class="fw-bold text-dark text-decoration-none small">Create Profile</a>
        </div>
    </div>
    
    <script>
        document.getElementById('passToggle').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            document.getElementById('passIcon').className = show ? 'ph ph-eye-slash' : 'ph ph-eye';
        });
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            if (!document.getElementById('email').value.trim() || !document.getElementById('password').value) {
                e.preventDefault();
                const err = document.getElementById('errorBanner');
                if (err) {
                   err.classList.remove('d-none');
                   document.getElementById('errorText').textContent = 'Please complete all required fields.';
                }
            } else {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerHTML = 'Verifying... <i class="ph ph-spinner ph-spin ms-2"></i>';
                this.submit();
            }
        });
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) { const pt = document.getElementById('errorText'); if(pt){ pt.textContent = decodeURIComponent(params.get('error')); document.getElementById('errorBanner').classList.remove('d-none'); }}
        if (params.get('msg')) { const st = document.getElementById('successText'); if(st){ st.textContent = decodeURIComponent(params.get('msg')); document.getElementById('successBanner').classList.remove('d-none'); }}
    </script>
</body>
</html>
