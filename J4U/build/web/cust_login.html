<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justice4U | Client Login</title>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Switzer:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* =========================================================================
       JUSTICE4U — LOGIN SYSTEM — 2026 EDITION
       Shared design tokens across all login pages
       ========================================================================= */
    :root {
      --bg:           #FDFBF7;
      --bg2:          #F5F2EC;
      --surface:      #FFFFFF;
      --surface-glass:rgba(253,251,247,0.72);
      --border:       rgba(28,25,23,0.08);
      --border-mid:   rgba(28,25,23,0.14);
      --border-focus: rgba(201,162,39,0.5);

      --text:         #1C1917;
      --text-muted:   #57534E;
      --text-faint:   #A8A29E;

      --gold:         #C9A227;
      --gold-light:   #E8C84A;
      --gold-dark:    #9E7C18;
      --gold-glow:    rgba(201,162,39,0.15);

      --error:        #DC2626;
      --error-bg:     #FEF2F2;
      --error-border: rgba(220,38,38,0.2);

      --font-sans:  'Switzer', sans-serif;
      --font-serif: 'Instrument Serif', serif;
      --ease-out:   cubic-bezier(0.16,1,0.3,1);
    }

    [data-theme="dark"] {
      --bg:           #0F0E0C;
      --bg2:          #161410;
      --surface:      #1A1814;
      --surface-glass:rgba(15,14,12,0.75);
      --border:       rgba(255,255,255,0.07);
      --border-mid:   rgba(255,255,255,0.12);
      --border-focus: rgba(212,175,55,0.45);

      --text:         #F5F2EC;
      --text-muted:   #A8A29E;
      --text-faint:   #57534E;

      --gold:         #D4AF37;
      --gold-light:   #F0CE5C;
      --gold-dark:    #B4901E;
      --gold-glow:    rgba(212,175,55,0.12);

      --error-bg:     rgba(220,38,38,0.08);
      --error-border: rgba(220,38,38,0.25);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s var(--ease-out), color 0.4s var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    /* Grain */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
    [data-theme="dark"] body::before { opacity: 0.045; }

    /* Aurora orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 55vw; height: 55vw; top: -20%; left: -15%;
      background: radial-gradient(circle, rgba(201,162,39,.1), transparent 70%);
      animation: d1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 40vw; height: 40vw; bottom: -10%; right: -10%;
      background: radial-gradient(circle, rgba(245,222,179,.07), transparent 70%);
      animation: d2 22s ease-in-out infinite alternate;
    }
    @keyframes d1 { 0%{transform:translate(0,0)} 100%{transform:translate(4vw,4vh)} }
    @keyframes d2 { 0%{transform:translate(0,0)} 100%{transform:translate(-3vw,5vh)} }
    @media (prefers-reduced-motion: reduce) { .orb { animation: none !important; } }

    /* ---- THEME TOGGLE (top right) ---- */
    .theme-btn {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface-glass); border: 1px solid var(--border-mid);
      backdrop-filter: blur(16px); color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .theme-btn:hover { background: var(--bg2); color: var(--text); }

    /* ---- CARD ---- */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 48px;
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      box-shadow: 0 8px 48px rgba(0,0,0,0.04);
      animation: cardIn 0.8s var(--ease-out) 0.1s both;
    }
    [data-theme="dark"] .login-card { box-shadow: 0 8px 48px rgba(0,0,0,0.3); }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(24px) scale(0.98); }
      to   { opacity:1; transform: none; }
    }

    /* Gold top bar */
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 64px; height: 3px; background: var(--gold);
      border-radius: 0 0 4px 4px;
    }

    /* ---- HEADER ---- */
    .card-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 9px; text-decoration: none; color: var(--text);
      font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--gold); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem;
    }

    .card-title {
      text-align: center; margin-bottom: 6px;
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
    }
    .card-title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--gold); }
    .card-sub {
      text-align: center; color: var(--text-muted); font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* ---- ROLE BADGE ---- */
    .role-badge {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 6px 14px; border-radius: 100px; width: fit-content; margin: 0 auto 32px;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      border: 1px solid var(--border-mid); background: var(--bg2); color: var(--text-muted);
    }
    .role-badge i { font-size: 1rem; color: var(--gold); }

    /* ---- ERROR BANNER ---- */
    .error-banner {
      display: none; align-items: flex-start; gap: 10px;
      padding: 12px 14px; border-radius: 12px; margin-bottom: 20px;
      background: var(--error-bg); border: 1px solid var(--error-border);
      color: var(--error); font-size: 0.88rem; font-weight: 500; line-height: 1.5;
    }
    .error-banner.visible { display: flex; }
    .error-banner i { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    /* ---- FORM ---- */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 0.85rem; font-weight: 600;
      margin-bottom: 7px; color: var(--text-muted); letter-spacing: 0.01em;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-faint); font-size: 1.1rem; pointer-events: none;
      transition: color 0.2s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%; padding: 13px 16px 13px 42px;
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg2); color: var(--text);
      font-family: var(--font-sans); font-size: 0.95rem; font-weight: 400;
      transition: all 0.25s var(--ease-out);
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--text-faint); }
    input:hover { border-color: var(--border-mid); }
    input:focus {
      outline: none;
      border-color: var(--border-focus);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }
    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--gold-dark); }

    /* Password toggle */
    .pass-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-faint); font-size: 1.1rem; padding: 4px;
      transition: color 0.2s; line-height: 1;
    }
    .pass-toggle:hover { color: var(--text-muted); }

    /* ---- SUBMIT BUTTON ---- */
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 12px; cursor: pointer;
      font-family: var(--font-sans); font-size: 0.97rem; font-weight: 700;
      letter-spacing: 0.01em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transition: all 0.25s var(--ease-out);
    }
    .btn-submit:hover { background: var(--gold-dark); transform: translateY(-2px); box-shadow: 0 8px 22px var(--gold-glow); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ---- DIVIDER ---- */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--text-faint); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ---- FOOTER LINKS ---- */
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 24px; padding-top: 22px;
      border-top: 1px solid var(--border);
      font-size: 0.84rem;
    }
    .card-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .card-footer a:hover { color: var(--gold-dark); }
    .card-footer .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--text-muted);
    }
    .card-footer .back-link:hover { color: var(--text); }

    @media (max-width: 480px) {
      .login-card { padding: 40px 24px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
    <i class="ph-fill ph-moon" id="themeIcon"></i>
  </button>

  <div class="login-card" role="main">

    <a href="Home.html" class="card-logo" aria-label="Justice4U home">
      <div class="logo-icon"><i class="ph-fill ph-scales"></i></div>
      Justice4U
    </a>

    <div class="role-badge">
      <i class="ph-fill ph-user-circle"></i>
      Client Portal
    </div>

    <h1 class="card-title">Welcome <em>back.</em></h1>
    <p class="card-sub">Access your secure client dashboard.</p>

    <div class="error-banner" id="errorBanner" role="alert" aria-live="polite">
      <i class="ph-fill ph-warning-circle"></i>
      <span id="errorText"></span>
    </div>

    <form action="LoginServlet" method="post" id="loginForm" novalidate>
      <input type="hidden" name="role" value="client">

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" required
                 placeholder="your@email.com" autocomplete="email">
          <i class="ph ph-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" required
                 placeholder="••••••••" autocomplete="current-password">
          <i class="ph ph-lock-simple input-icon"></i>
          <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password visibility">
            <i class="ph ph-eye" id="passIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnLabel">Sign In Securely</span>
        <i class="ph-bold ph-arrow-right" id="btnIcon"></i>
      </button>
    </form>

    <div class="card-footer">
      <a href="role_select.html" class="back-link">
        <i class="ph-bold ph-arrow-left"></i> Back
      </a>
      <a href="customer.html">Create Account</a>
    </div>

  </div>

  <script>
    /* ---- DARK MODE ---- */
    const root = document.documentElement;
    const tBtn = document.getElementById('themeToggle');
    const tIcon = document.getElementById('themeIcon');
    const saved = localStorage.getItem('j4u-theme');
    const sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const init  = saved || (sys ? 'dark' : 'light');
    root.setAttribute('data-theme', init);
    tIcon.className = init === 'dark' ? 'ph-fill ph-sun' : 'ph-fill ph-moon';
    tBtn.addEventListener('click', () => {
      const n = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', n);
      tIcon.className = n === 'dark' ? 'ph-fill ph-sun' : 'ph-fill ph-moon';
      localStorage.setItem('j4u-theme', n);
    });

    /* ---- PASSWORD TOGGLE ---- */
    document.getElementById('passToggle').addEventListener('click', () => {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('passIcon');
      const show = inp.type === 'password';
      inp.type   = show ? 'text' : 'password';
      icon.className = show ? 'ph ph-eye-slash' : 'ph ph-eye';
    });

    /* ---- FORM SUBMIT ---- */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) {
        e.preventDefault();
        showError('Please fill in all fields.');
        return;
      }
      const btn  = document.getElementById('submitBtn');
      const lbl  = document.getElementById('btnLabel');
      const icon = document.getElementById('btnIcon');
      btn.disabled = true;
      lbl.textContent = 'Signing in…';
      icon.className  = 'ph ph-spinner ph-spin';
    });

    /* ---- URL ERROR HANDLING ---- */
    function showError(msg) {
      const banner = document.getElementById('errorBanner');
      document.getElementById('errorText').textContent = msg;
      banner.classList.add('visible');
    }
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error') || params.get('msg');
    if (err) showError(decodeURIComponent(err));
  </script>
</body>
</html>
